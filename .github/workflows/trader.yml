name: crypto-quant

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:

    - name: checkout
      uses: actions/checkout@v3

    - name: python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: install
      run: pip install -r requirements.txt

    - name: run
      run: python quant_engine.py
