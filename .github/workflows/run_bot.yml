name: crypto_quant_engine

on:
workflow_dispatch:

jobs:
run:
runs-on: ubuntu-latest

steps:

- name: checkout
  uses: actions/checkout@v3

- name: setup python
  uses: actions/setup-python@v4
  with:
    python-version: "3.10"

- name: install deps
  run: |
    pip install -r requirements.txt

- name: run engine
  run: |
    python quant_engine.py
