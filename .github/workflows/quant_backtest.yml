name: Quant Research Backtest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  quant-backtest:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy ccxt

      - name: Run Quant Research Engine
        run: |
          python quant_research_engine.py

      - name: Save timestamp
        run: |
          echo "Backtest completed at $(date)" >> run_log.txt

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: quant-backtest-report
          path: |
            quant_research_report.txt
            run_log.txt
