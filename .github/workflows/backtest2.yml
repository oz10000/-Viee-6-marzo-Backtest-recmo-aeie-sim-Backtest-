name: Run BadTestClasificador

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # corre todos los días a medianoche UTC, opcional

jobs:
  run-backtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ccxt pandas numpy numba

      - name: Run BadTestClasificador
        run: python BadTestClasificador.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: backtest_take_drop.txt
